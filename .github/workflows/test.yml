name: 🧪 Up Hera Test Suite

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main, develop ]

jobs:
  test:
    runs-on: ubuntu-latest
    
    strategy:
      matrix:
        python-version: [3.11, 3.12]
        test-category: [unit, websocket, streaming, integration]
    
    steps:
    - name: 📥 Checkout code
      uses: actions/checkout@v4
    
    - name: 🐍 Set up Python ${{ matrix.python-version }}
      uses: actions/setup-python@v4
      with:
        python-version: ${{ matrix.python-version }}
    
    - name: 📦 Cache pip dependencies
      uses: actions/cache@v3
      with:
        path: ~/.cache/pip
        key: ${{ runner.os }}-pip-${{ hashFiles('**/requirements.txt') }}
        restore-keys: |
          ${{ runner.os }}-pip-
    
    - name: 🔧 Install dependencies
      run: |
        python -m pip install --upgrade pip
        cd api
        pip install -r requirements.txt
        pip install pytest pytest-asyncio psutil pytest-cov
    
    - name: 🧪 Run ${{ matrix.test-category }} tests
      run: |
        cd api
        python -m pytest tests/test_${{ matrix.test-category }}.py -v --tb=short
      env:
        PYTHONPATH: /home/runner/work/uphera/uphera
    
    - name: 📊 Upload test results
      uses: actions/upload-artifact@v3
      if: always()
      with:
        name: test-results-${{ matrix.python-version }}-${{ matrix.test-category }}
        path: api/test-results/

  load-test:
    runs-on: ubuntu-latest
    needs: test
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    
    steps:
    - name: 📥 Checkout code
      uses: actions/checkout@v4
    
    - name: 🐍 Set up Python 3.12
      uses: actions/setup-python@v4
      with:
        python-version: 3.12
    
    - name: 🔧 Install dependencies
      run: |
        python -m pip install --upgrade pip
        cd api
        pip install -r requirements.txt
        pip install pytest pytest-asyncio psutil
    
    - name: 🚀 Run load tests
      run: |
        cd api
        python -m pytest tests/test_load.py -v --tb=short -s
      env:
        PYTHONPATH: /home/runner/work/uphera/uphera
    
    - name: 📈 Upload load test results
      uses: actions/upload-artifact@v3
      if: always()
      with:
        name: load-test-results
        path: api/test-results/

  coverage:
    runs-on: ubuntu-latest
    needs: test
    
    steps:
    - name: 📥 Checkout code
      uses: actions/checkout@v4
    
    - name: 🐍 Set up Python 3.12
      uses: actions/setup-python@v4
      with:
        python-version: 3.12
    
    - name: 🔧 Install dependencies
      run: |
        python -m pip install --upgrade pip
        cd api
        pip install -r requirements.txt
        pip install pytest pytest-asyncio pytest-cov psutil
    
    - name: 📊 Run tests with coverage
      run: |
        cd api
        python -m pytest tests/ --cov=. --cov-report=xml --cov-report=html
      env:
        PYTHONPATH: /home/runner/work/uphera/uphera
    
    - name: 📤 Upload coverage to Codecov
      uses: codecov/codecov-action@v3
      with:
        file: api/coverage.xml
        fail_ci_if_error: true
    
    - name: 📈 Upload coverage report
      uses: actions/upload-artifact@v3
      with:
        name: coverage-report
        path: api/htmlcov/

  frontend-test:
    runs-on: ubuntu-latest
    
    steps:
    - name: 📥 Checkout code
      uses: actions/checkout@v4
    
    - name: 🟢 Set up Node.js
      uses: actions/setup-node@v3
      with:
        node-version: '18'
        cache: 'npm'
        cache-dependency-path: web/package-lock.json
    
    - name: 📦 Install frontend dependencies
      run: |
        cd web
        npm ci
    
    - name: 🏗️ Build frontend
      run: |
        cd web
        npm run build
    
    - name: 🧪 Run frontend linting
      run: |
        cd web
        npm run lint
    
    - name: ✅ Frontend build artifacts
      uses: actions/upload-artifact@v3
      with:
        name: frontend-build
        path: web/dist/

  integration-test:
    runs-on: ubuntu-latest
    needs: [test, frontend-test]
    
    services:
      database:
        image: sqlite:latest
    
    steps:
    - name: 📥 Checkout code
      uses: actions/checkout@v4
    
    - name: 🐍 Set up Python 3.12
      uses: actions/setup-python@v4
      with:
        python-version: 3.12
    
    - name: 🟢 Set up Node.js
      uses: actions/setup-node@v3
      with:
        node-version: '18'
        cache: 'npm'
        cache-dependency-path: web/package-lock.json
    
    - name: 🔧 Install backend dependencies
      run: |
        python -m pip install --upgrade pip
        cd api
        pip install -r requirements.txt
        pip install pytest pytest-asyncio psutil
    
    - name: 📦 Install frontend dependencies
      run: |
        cd web
        npm ci
    
    - name: 🏗️ Build frontend
      run: |
        cd web
        npm run build
    
    - name: 🚀 Start backend server
      run: |
        cd api
        python main.py &
        sleep 10
      env:
        API_HOST: 0.0.0.0
        API_PORT: 8000
        API_DEBUG: false
    
    - name: 🧪 Run full integration tests
      run: |
        cd api
        python -m pytest tests/test_integration.py -v --tb=short
      env:
        PYTHONPATH: /home/runner/work/uphera/uphera
        API_URL: http://localhost:8000

  security-scan:
    runs-on: ubuntu-latest
    
    steps:
    - name: 📥 Checkout code
      uses: actions/checkout@v4
    
    - name: 🐍 Set up Python 3.12
      uses: actions/setup-python@v4
      with:
        python-version: 3.12
    
    - name: 🔧 Install security tools
      run: |
        python -m pip install --upgrade pip
        pip install bandit safety
    
    - name: 🔒 Run Bandit security scan
      run: |
        cd api
        bandit -r . -f json -o bandit-report.json || true
    
    - name: 🛡️ Run Safety dependency scan
      run: |
        cd api
        safety check --json --output safety-report.json || true
    
    - name: 📤 Upload security reports
      uses: actions/upload-artifact@v3
      if: always()
      with:
        name: security-reports
        path: |
          api/bandit-report.json
          api/safety-report.json

  notify-success:
    runs-on: ubuntu-latest
    needs: [test, load-test, coverage, frontend-test, integration-test, security-scan]
    if: success()
    
    steps:
    - name: 🎉 Success notification
      run: |
        echo "🎉 All tests passed! Up Hera is ready for deployment!"
        echo "✅ Unit Tests: PASSED"
        echo "✅ Integration Tests: PASSED"
        echo "✅ Load Tests: PASSED"
        echo "✅ Coverage: COMPLETED"
        echo "✅ Frontend: PASSED"
        echo "✅ Security Scan: COMPLETED"

  notify-failure:
    runs-on: ubuntu-latest
    needs: [test, load-test, coverage, frontend-test, integration-test, security-scan]
    if: failure()
    
    steps:
    - name: ❌ Failure notification
      run: |
        echo "❌ Some tests failed! Please check the logs."
        echo "🔧 Fix failing tests before merging."
